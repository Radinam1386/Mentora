name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/project/Mentora
            git pull origin main

            # Backend
            cd backend
            source env/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            deactivate
            cd ..

            # Frontend
            cd "mentora frontend"
            npm ci
            npm run build
            cd ..

            # Sync frontend build to nginx root
            rm -rf /var/www/mentora/build/*
            cp -r "mentora frontend/build/." /var/www/mentora/build/
            chown -R www-data:www-data /var/www/mentora/build

            # Restart services
            systemctl restart mentora
            systemctl reload nginx
