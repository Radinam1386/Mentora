# Mentora nginx site config.
# Install to /etc/nginx/sites-available/mentora and symlink into sites-enabled.
# Replace YOUR_DOMAIN_OR_IP and the two /var/www/mentora paths if you deploy
# somewhere else.

upstream mentora_backend {
    server unix:/run/mentora/gunicorn.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    # The RAG question solver can receive uploaded images.
    client_max_body_size 25M;

    # React (Create React App) production build.
    root "/var/www/mentora/mentora frontend/build";
    index index.html;

    # Django / DRF / admin static files (collectstatic output).
    location /django-static/ {
        alias /var/www/mentora/backend/staticfiles/;
        access_log off;
        expires 30d;
    }

    # User uploads and practice question media.
    location /media/ {
        alias /var/www/mentora/backend/media/;
        access_log off;
        expires 7d;
    }

    # API + Django admin -> gunicorn.
    location /api/ {
        proxy_pass http://mentora_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM / RAG calls can take a while.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://mentora_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # React Router single-page-app fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
